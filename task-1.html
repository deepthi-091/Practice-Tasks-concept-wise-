<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btnn{
          
            border: none;
            background: #1e90ff;
            color: white;
            border-radius: 5px;
            padding: 0.5em;
        }
        .btn-hide{
            display: none;
        }
    </style>
</head>
<body>
    <button type="button" class="btnn" id="btn">Change text</button>
    <p id="para"></p>
    <script>
        const btn=document.getElementById("btn");
        const txt=document.getElementById("para");
        btn.addEventListener("click",function(){
            txt.textContent="clicked";
            if(btn.classList.contains("btnn")){
                btn.classList.remove("btnn");
                btn.classList.add("btn-hide")
            }
        })
    </script>
</body>
</html>
